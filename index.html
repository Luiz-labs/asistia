<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESBAS - Asistencia</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
  }

  .topbar {
    background: #2d8cf0;
    padding: 15px;
    font-weight: bold;
    font-size: 18px;
  }

  .container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
  }

  h2 {
    margin-top: 10px;
  }

  .logo {
    width: 120px;
    margin: 20px auto;
    display: block;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #2d8cf0;
    color: white;
    font-size: 16px;
    font-weight: bold;
  }

  video {
    width: 100%;
    margin-top: 15px;
    border-radius: 10px;
  }

  #mensaje {
    margin-top: 15px;
    font-weight: bold;
  }

  footer {
    margin-top: 30px;
    font-size: 12px;
    color: #aaa;
  }

  /* 📱 CELULAR */
  @media (max-width: 600px) {
    .logo {
      width: 140px;
    }
  }

  /* 💻 PANTALLA GRANDE */
  @media (min-width: 900px) {
    .container {
      margin-top: 40px;
    }

    .logo {
      width: 100px;
    }
  }
  </style>

</head>

<body>

<div id="loader" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  color:white;
  font-size:20px;
  justify-content:center;
  align-items:center;
  z-index:9999;
">
  ⏳ Procesando...
</div>

<!-- HEADER -->
<div class="topbar">INICIO</div>

<!-- CONTENIDO -->
<div class="container">

  <h2>ESBAS 2026</h2>
  <p>Área de Instrucción</p>

  <!-- LOGO (CAMBIAS LA RUTA LUEGO) -->
  <img src="logo.png" class="logo">

<!-- BOTÓN PRINCIPAL -->
<button onclick="iniciarEscaneo()">📷 Escanear QR</button>

<button id="btnCancelar" onclick="detenerCamara()" style="display:none;">
  ❌ Cancelar
</button>

<video id="video" style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<p id="mensaje"></p>

<!-- FORMULARIO (APARECE DESPUÉS DEL QR) -->
<div id="formulario" style="display:none; margin-top:20px;">

  <input type="text" id="dni" placeholder="DNI">
  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="text" id="ubo" placeholder="UBO / Compañía">

  <select id="seccion">
    <option value="">Selecciona sección</option>
    <option>Sección A (Martes y Jueves presencial B28)</option>
    <option>Sección B (Sábado presencial B28)</option>
    <option>Sección C (Sábado virtual)</option>
  </select>

  <button onclick="guardarAsistencia()">✅ Registrar Asistencia</button>

</div>

<!-- ADMIN -->
<button onclick="mostrarAdmin()">👩‍💼 Panel Admin</button>

<footer>
  Luiz-Labs © 2026
</footer>

<div id="adminModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  z-index:999;
  overflow:auto;
  padding:20px;
">

  <div style="max-width:800px; margin:auto; color:white;">

    <button onclick="cerrarAdmin()" style="
      background:red;
      padding:10px;
      border:none;
      border-radius:8px;
      margin-bottom:15px;
    ">
      ❌ Cerrar
    </button>

    <h2>Panel Administrativo</h2>
    <input type="date" id="filtroFecha" onchange="cargarDatos()">
    <button onclick="exportarExcel()">📥 Excel</button>


    <div id="indicadores"></div>

    <table border="1" style="width:100%; margin-top:15px;">
      <thead>
        <tr>
          <th>DNI</th>
          <th>Nombre</th>
          <th>UBO</th>
          <th>Fecha</th>
          <th>Hora</th>
        </tr>
      </thead>
      <tbody id="tablaBody"></tbody>
    </table>

  </div>
</div>

<!-- LIBRERÍAS -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr"></script>

<script>
const supabaseUrl = 'https://kcapmyovaigjntaqeqwn.supabase.co'
const supabaseKey = 'sb_publishable_oObf3s5mQ4sfmJ03JKQrnQ__8Rmb63F'

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey)

// DEVICE ID
function getDeviceId() {
  let deviceId = localStorage.getItem("device_id")

  if (!deviceId) {
    deviceId = 'dev-' + Math.random().toString(36).substring(2, 10)
    localStorage.setItem("device_id", deviceId)
  }

  return deviceId
}

let streamGlobal = null

function iniciarEscaneo() {

  const video = document.getElementById("video")
  const btnCancelar = document.getElementById("btnCancelar")

  video.style.display = "block"
  btnCancelar.style.display = "block"

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
      streamGlobal = stream
      video.srcObject = stream
      video.play()
      requestAnimationFrame(scanQR)
    })
}

function scanQR() {
  const video = document.getElementById("video")
  const canvas = document.getElementById("canvas")
  const ctx = canvas.getContext("2d")

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.height = video.videoHeight
    canvas.width = video.videoWidth

    ctx.drawImage(video, 0, 0)

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height)
    const code = jsQR(imageData.data, imageData.width, imageData.height)

    if (code) {
      detenerCamara()

      if (code.data !== "ESBAS-2026") {
        mostrarMensaje("❌ QR inválido", "error")
        return
      }

      mostrarMensaje("✅ QR válido, completa tus datos", "ok")
      document.getElementById("formulario").style.display = "block"
      return
    }
  }

  requestAnimationFrame(scanQR)
}

function detenerCamara() {
  if (streamGlobal) {
    streamGlobal.getTracks().forEach(track => track.stop())
  }

  document.getElementById("video").style.display = "none"
  document.getElementById("btnCancelar").style.display = "none"
}



// REGISTRAR
async function registrarAsistencia(qrData) {

  const QR_VALIDO = "ESBAS-2026"

  if (qrData !== QR_VALIDO) {
    mostrarMensaje("❌ QR inválido", "error")
    return
  }

  const dni = document.getElementById("dni").value
  const nombre = document.getElementById("nombre").value
  const ubo = document.getElementById("ubo").value
  const deviceId = getDeviceId()

  navigator.geolocation.getCurrentPosition(async function(position) {

    const lat = position.coords.latitude
    const lng = position.coords.longitude

    const { error } = await supabaseClient
      .from('asistencias')
      .insert([
        { dni, nombre, ubo, latitud: lat, longitud: lng, device_id: deviceId }
      ])

    if (error) {

      // detectar duplicado
      if (error.message.includes("duplicate")) {
        mostrarMensaje("⚠ Ya registraste asistencia hoy", "warn")
      } else {
        mostrarMensaje("❌ Error al registrar", "error")
      }

    } else {
      mostrarMensaje("✅ Asistencia registrada", "ok")
    }

  }, function() {
    mostrarMensaje("⚠ Activa GPS", "warn")
  })
}

// 🔐 CLAVE SIMPLE
const ADMIN_PASS = "1234"

// Mostrar panel
function mostrarAdmin() {
  const pass = prompt("Ingrese clave admin")

  if (pass === ADMIN_PASS) {
    document.getElementById("adminModal").style.display = "block"
  } else {
    alert("Clave incorrecta")
  }
}

function cerrarAdmin() {
  document.getElementById("adminModal").style.display = "none"
}

function mostrarMensaje(texto, tipo="ok") {

  const el = document.getElementById("mensaje")

  let color = "white"

  if (tipo === "ok") color = "lightgreen"
  if (tipo === "error") color = "red"
  if (tipo === "warn") color = "yellow"

  el.style.color = color
  el.innerText = texto
}

// 📊 Cargar datos
async function cargarDatos() {

  const filtroFecha = document.getElementById("filtroFecha").value
  const TOTAL_CLASES = 10

  let query = supabaseClient
    .from('asistencias')
    .select('*')
    .order('fecha', { ascending: true })

  if (filtroFecha) {
    query = query.eq('fecha', filtroFecha)
  }

  const { data, error } = await query

  if (error) {
    alert("Error al cargar datos")
    return
  }

  const tbody = document.getElementById("tablaBody")
  tbody.innerHTML = ""

  let alumnos = {}

  data.forEach(row => {

    if (!alumnos[row.dni]) {
      alumnos[row.dni] = {
        nombre: row.nombre,
        ubo: row.ubo,
        asistencias: 0
      }
    }

    alumnos[row.dni].asistencias++

    tbody.innerHTML += `
      <tr>
        <td>${row.dni}</td>
        <td>${row.nombre}</td>
        <td>${row.ubo}</td>
        <td>${row.fecha}</td>
        <td>${row.hora}</td>
      </tr>
    `
  })

  let html = "<h3>Indicadores</h3>"

  for (let dni in alumnos) {

    let asistencias = alumnos[dni].asistencias
    let faltas = TOTAL_CLASES - asistencias
    let porcentaje = ((asistencias / TOTAL_CLASES) * 100).toFixed(0)

    let color = "green"

    if (porcentaje < 70) color = "red"
    else if (porcentaje < 90) color = "yellow"

    html += `
      <div style="
        background:#222;
        margin:10px 0;
        padding:10px;
        border-radius:8px;
        border-left:6px solid ${color};
      ">
        <strong>${alumnos[dni].nombre}</strong><br>
        DNI: ${dni} | UBO: ${alumnos[dni].ubo}<br>
        ✔ Asistencias: ${asistencias} <br>
        ❌ Faltas: ${faltas} <br>
        📊 % Asistencia: ${porcentaje}%
      </div>
    `
  }

  document.getElementById("indicadores").innerHTML = html
}



// 📥 EXPORTAR EXCEL
function exportarExcel() {

  let contenido = "DNI,Nombre,UBO,Fecha,Hora\n"

  document.querySelectorAll("#tablaBody tr").forEach(row => {
    let cols = row.querySelectorAll("td")

    contenido += `${cols[0].innerText},${cols[1].innerText},${cols[2].innerText},${cols[3].innerText},${cols[4].innerText}\n`
  })

  let blob = new Blob([contenido], { type: "text/csv;charset=utf-8;" })

  let url = URL.createObjectURL(blob)

  let a = document.createElement("a")
  a.href = url
  a.download = "reporte_esbas.csv"
  a.click()
}

function mostrarLoader() {
  document.getElementById("loader").style.display = "flex"
}

function ocultarLoader() {
  document.getElementById("loader").style.display = "none"
}

async function guardarAsistencia() {

  const dni = document.getElementById("dni").value
  const nombre = document.getElementById("nombre").value
  const ubo = document.getElementById("ubo").value
  const seccion = document.getElementById("seccion").value

  if (!dni || !nombre || !ubo || !seccion) {
    mostrarMensaje("⚠ Completa todos los campos", "warn")
    return
  }

  mostrarLoader()

  const deviceId = getDeviceId()

  navigator.geolocation.getCurrentPosition(async function(position) {

    const lat = position.coords.latitude
    const lng = position.coords.longitude

    const { error } = await supabaseClient
      .from('asistencias')
      .insert([
        { dni, nombre, ubo, seccion, latitud: lat, longitud: lng, device_id: deviceId }
      ])

    ocultarLoader()

    if (error) {

      if (error.message.includes("duplicate")) {
        mostrarMensaje("⚠ Ya registraste hoy", "warn")
      } else {
        mostrarMensaje("❌ Error al registrar", "error")
      }

    } else {
      mostrarMensaje("✅ Asistencia registrada", "ok")

      // limpiar form
      document.getElementById("formulario").style.display = "none"
    }

  }, function() {
    ocultarLoader()
    mostrarMensaje("⚠ Activa GPS", "warn")
  })
}

</script>

</body>
</html>
