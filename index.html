<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESBAS - Asistencia</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
  }

  .topbar {
    background: #2d8cf0;
    padding: 15px;
    font-weight: bold;
    font-size: 18px;
  }

  .container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
  }

  h2 {
    margin-top: 10px;
  }

  .logo {
    width: 120px;
    margin: 20px auto;
    display: block;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #2d8cf0;
    color: white;
    font-size: 16px;
    font-weight: bold;
  }

  video {
    width: 100%;
    margin-top: 15px;
    border-radius: 10px;
  }

  #mensaje {
    margin-top: 15px;
    font-weight: bold;
  }

  footer {
    margin-top: 30px;
    font-size: 12px;
    color: #aaa;
  }

  /* 📱 CELULAR */
  @media (max-width: 600px) {
    .logo {
      width: 140px;
    }
  }

  /* 💻 PANTALLA GRANDE */
  @media (min-width: 900px) {
    .container {
      margin-top: 40px;
    }

    .logo {
      width: 100px;
    }
  }
  </style>

</head>

<body>

<!-- HEADER -->
<div class="topbar">INICIO</div>

<!-- CONTENIDO -->
<div class="container">

  <h2>ESBAS 2026</h2>
  <p>Área de Instrucción</p>

  <!-- LOGO (CAMBIAS LA RUTA LUEGO) -->
  <img src="logo.png" class="logo">

  <!-- FORM -->
  <input type="text" id="dni" placeholder="DNI">
  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="text" id="ubo" placeholder="UBO / Compañía">

  <button onclick="iniciarEscaneo()">📷 Escanear QR</button>

  <button id="btnCancelar" onclick="detenerCamara()" style="display:none;">
    ❌ Cancelar
  </button>

  <video id="video" style="display:none;"></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <p id="mensaje"></p>

</div>

<footer>
  Luiz-Labs © 2026
</footer>

<!-- LIBRERÍAS -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr"></script>

<script>
const supabaseUrl = 'https://kcapmyovaigjntaqeqwn.supabase.co'
const supabaseKey = 'sb_publishable_oObf3s5mQ4sfmJ03JKQrnQ__8Rmb63F'

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey)

// DEVICE ID
function getDeviceId() {
  let deviceId = localStorage.getItem("device_id")

  if (!deviceId) {
    deviceId = 'dev-' + Math.random().toString(36).substring(2, 10)
    localStorage.setItem("device_id", deviceId)
  }

  return deviceId
}

let streamGlobal = null

function iniciarEscaneo() {

  const dni = document.getElementById("dni").value
  const nombre = document.getElementById("nombre").value
  const ubo = document.getElementById("ubo").value

  if (!dni || !nombre || !ubo) {
    document.getElementById("mensaje").innerText = "⚠ Completa todos los campos"
    return
  }

  const video = document.getElementById("video")
  const btnCancelar = document.getElementById("btnCancelar")

  video.style.display = "block"
  btnCancelar.style.display = "block"

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
      streamGlobal = stream
      video.srcObject = stream
      video.play()
      requestAnimationFrame(scanQR)
    })
}

function scanQR() {
  const video = document.getElementById("video")
  const canvas = document.getElementById("canvas")
  const ctx = canvas.getContext("2d")

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.height = video.videoHeight
    canvas.width = video.videoWidth

    ctx.drawImage(video, 0, 0)

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height)
    const code = jsQR(imageData.data, imageData.width, imageData.height)

    if (code) {
      detenerCamara()
      registrarAsistencia(code.data)
      return
    }
  }

  requestAnimationFrame(scanQR)
}

function detenerCamara() {
  if (streamGlobal) {
    streamGlobal.getTracks().forEach(track => track.stop())
  }

  document.getElementById("video").style.display = "none"
  document.getElementById("btnCancelar").style.display = "none"
}

// REGISTRAR
async function registrarAsistencia(qrData) {

  const QR_VALIDO = "ESBAS-2026"

  if (qrData !== QR_VALIDO) {
    document.getElementById("mensaje").innerText = "❌ QR inválido"
    return
  }

  const dni = document.getElementById("dni").value
  const nombre = document.getElementById("nombre").value
  const ubo = document.getElementById("ubo").value
  const deviceId = getDeviceId()

  navigator.geolocation.getCurrentPosition(async function(position) {

    const lat = position.coords.latitude
    const lng = position.coords.longitude

    const { error } = await supabaseClient
      .from('asistencias')
      .insert([
        { dni, nombre, ubo, latitud: lat, longitud: lng, device_id: deviceId }
      ])

    if (error) {
      document.getElementById("mensaje").innerText = "⚠ Ya registraste hoy o error"
    } else {
      document.getElementById("mensaje").innerText = "✅ Asistencia registrada"
    }

  }, function() {
    document.getElementById("mensaje").innerText = "⚠ Activa GPS"
  })
}
</script>

</body>
</html>
