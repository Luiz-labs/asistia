<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>asistIA Asistencia Staff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/staff-asistencia/style.css?v=1.0.0-build10020">
</head>
<body>
  <main class="public-shell">
    <section class="public-card">
      <div class="brand-block">
        <img class="brand-logo" src="/asistIA_logo.png" alt="asistIA">
        <div>
          <h1 class="brand-title">asist<span>IA</span></h1>
          <span class="module-badge module-badge-staff">🧑‍🚒 MÓDULO STAFF</span>
          <p class="brand-subtitle">Registro de asistencia</p>
          <p id="tenantLabel" class="tenant-label"></p>
        </div>
      </div>
      <p class="step-copy">Redirigiendo al módulo staff...</p>
    </section>
    <footer class="public-footer">asistIA v1.0.0-build10020 · Módulo Staff · Luiz-Labs © 2026</footer>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    (() => {
      const APP_VERSION = "1.0.0-build10020"
      const RESET_KEY = `asistia_staff_cache_reset_${APP_VERSION}`
      const path = String(window.location.pathname || "")
      const isStaffRoute = /(^|\/)staff-asistencia(\/|$)/.test(path)

      function redirigirRutaPublicaBonitaSiCorresponde() {
        const segments = path.split("/").filter(Boolean)
        const idxStaff = segments.indexOf("staff-asistencia")
        if (idxStaff <= 0) return false

        const tenant = String(segments[idxStaff - 1] || "").trim().toLowerCase()
        if (!tenant) return false

        const params = new URLSearchParams(window.location.search || "")
        if (!params.get("tenant")) {
          params.set("tenant", tenant)
        }

        const destino = `/staff-asistencia/index.html?${params.toString()}`
        if (window.location.pathname === "/staff-asistencia/index.html") return false
        window.location.replace(destino)
        return true
      }

      if (redirigirRutaPublicaBonitaSiCorresponde()) {
        return
      }

      function appendScript(src) {
        const script = document.createElement("script")
        script.src = src
        document.body.appendChild(script)
      }

      function bootScripts() {
        appendScript(`/support-report.js?v=${APP_VERSION}`)
        appendScript(`/staff-asistencia/app.js?v=${APP_VERSION}`)
        appendScript(`/pwa-register.js?v=${APP_VERSION}`)
      }

      if (!isStaffRoute) {
        bootScripts()
        return
      }

      if (sessionStorage.getItem(RESET_KEY) === "done") {
        bootScripts()
        return
      }

      ;(async () => {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations()
            await Promise.all(registrations.map(registration => registration.unregister()))
          }

          if ("caches" in window) {
            const cacheNames = await caches.keys()
            await Promise.all(
              cacheNames
                .filter(name => /asist|pwa|workbox/i.test(String(name || "")))
                .map(name => caches.delete(name))
            )
          }
        } catch (error) {
          console.warn("No se pudo limpiar el cache de staff:", error)
        } finally {
          sessionStorage.setItem(RESET_KEY, "done")
          window.location.replace(window.location.href)
        }
      })()
    })()
  </script>
</body>
</html>
