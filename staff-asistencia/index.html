<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>asistIA Asistencia Staff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/staff-asistencia/style.css">
</head>
<body>
  <main class="public-shell">
    <section class="public-card">
      <div class="brand-block">
        <img class="brand-logo" src="/asistIA_logo.png" alt="asistIA">
        <div>
          <h1 class="brand-title">Asistencia Staff</h1>
          <p class="brand-subtitle">Marcación independiente para APOYO y ADJUNTO</p>
          <p id="tenantLabel" class="tenant-label"></p>
        </div>
      </div>

      <section id="staffLookupSection" class="step-block">
        <p class="step-copy">Ingresa tu Código de Bombero para validar tu padrón institucional.</p>
        <input id="codigoBomberoInput" class="text-input" placeholder="Ejemplo: A17200" autocomplete="off">
        <button id="btnBuscarStaff" class="primary-btn" type="button">Ingresar</button>
      </section>

      <section id="staffCardSection" class="staff-card-shell" hidden></section>

      <section id="staffSuccessSection" class="success-shell" hidden></section>

      <p id="mensaje" class="message-box" aria-live="polite"></p>
    </section>
    <footer class="public-footer">Desarrollado por Luiz-Labs © 2026</footer>
  </main>

  <div id="staffProfileModal" class="staff-modal" hidden aria-hidden="true">
    <div class="staff-modal-backdrop" data-close-staff-modal="true"></div>
    <section class="staff-modal-sheet" role="dialog" aria-modal="true" aria-label="Editar perfil staff">
      <div class="staff-modal-handle" aria-hidden="true"></div>
      <div class="staff-modal-head">
        <div>
          <h3>Editar perfil</h3>
          <p>Actualiza foto, celular y correo.</p>
        </div>
        <button id="btnCloseStaffModal" class="staff-modal-close" type="button" aria-label="Cerrar">×</button>
      </div>

      <form id="staffProfileForm" class="staff-profile-form">
        <div class="staff-photo-editor">
          <div id="staffPhotoPreview" class="staff-photo-preview"></div>
          <div class="staff-photo-copy">
            <strong>Foto de perfil</strong>
            <span>JPG, PNG o WEBP. Máximo 2 MB.</span>
            <input id="staffFotoFile" type="file" accept="image/jpeg,image/png,image/webp">
          </div>
        </div>

        <div class="staff-profile-grid">
          <label class="staff-profile-field">
            <span>Celular</span>
            <input id="staffPerfilCelular" class="text-input" placeholder="Solo números" inputmode="numeric" autocomplete="tel">
          </label>
          <label class="staff-profile-field">
            <span>Correo</span>
            <input id="staffPerfilCorreo" class="text-input" placeholder="correo@dominio.com" type="email" autocomplete="email">
          </label>
        </div>

        <p id="staffProfileMsg" class="inline-form-msg" aria-live="polite"></p>

        <div class="staff-profile-actions">
          <button id="btnGuardarPerfilStaff" class="primary-btn" type="submit">Guardar cambios</button>
          <button id="btnCancelarPerfilStaff" class="secondary-btn" type="button">Cancelar</button>
        </div>
      </form>
    </section>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/staff-asistencia/app.js"></script>
</body>
</html>
